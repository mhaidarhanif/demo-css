<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo CSS</title>
    <meta name="description" content="This is a CSS demo." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <header class="font-primary text-teal-900 p-10">
      <h1>(Header Hero) Demo CSS</h1>
      <p>This is a CSS demo or example.</p>
    </header>

    <main>
      <header class="text-teal-900">
        <h2 class="text-lg">(Header) This is an image</h2>
      </header>
      <p>
        <a href="https://example.com">Example</a>
      </p>
      <img
        class="hover:opacity-5"
        src="https://picsum.photos/536/354"
        alt="Random image"
      />

      <form>
        <label for="email">Email</label>
        <input
          class="focus:bg-blue-100"
          type="email"
          name="email"
          id="email"
          placeholder="yourname@mail.com"
        />
        <button type="submit">Register</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2022 Demo CSS</p>
    </footer>
  </body>
</html>
