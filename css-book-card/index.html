<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Book Card</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="flex flex-wrap gap-1 p-1">
      <div class="p-1">
        <h1>Example</h1>
        <img class="w-400" src="./assets/example.png" alt="Book Card Example" />
      </div>

      <div class="bg-gray p-1">
        <h1>Result</h1>
        <div class="book-card bg-white p-1 flex flex-col gap-2">
          <div class="flex">
            <img
              class="w-120 object-contain"
              src="./assets/book.png"
              alt="Book Cover"
            />
            <div class="flex flex-col p-1 gap-1">
              <h2>Alone on the wall</h2>
              <p>by David Roberts</p>
              <p class="max-w-200">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
              </p>
            </div>
          </div>
          <div class="flex gap-1">
            <img src="./assets/avatar.jpg" alt="Avatar" />
            <span class="bold">Kimberly Jones</span>
            <span>like this</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
