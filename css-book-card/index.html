<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Book Card</title>
    <link rel="stylesheet" href="/styles/book-card.css" />
  </head>
  <body>
    <main class="flex gap-1 p-1">
      <div class="p-1">
        <h1>Example</h1>
        <img class="w-400" src="/assets/example.png" alt="Book Card Example" />
      </div>

      <div class="bg-gray p-1 w-full">
        <h1>Result</h1>
        <div class="w-360 bg-white p-1 flex flex-col gap-2 mt-12">
          <div class="flex gap-2 h-150">
            <img
              class="h-200 object-contain relative top-1"
              src="/assets/book.png"
              alt="Book Cover"
            />
            <div class="flex flex-col gap-1">
              <h2>Alone on the wall</h2>
              <p>by David Roberts</p>
              <p class="max-w-200">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
              </p>
            </div>
          </div>
          <div class="flex gap-1 align-center">
            <img
              class="size-25 rounded-full"
              src="https://picsum.photos/id/64/100/100"
              alt="Avatar"
            />
            <span class="bold">Kimberly Jones</span>
            <span>like this</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
